apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-bridge
  namespace: monitoring
  labels:
    app: prometheus-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-bridge
  template:
    metadata:
      labels:
        app: prometheus-bridge
    spec:
      containers:
      - name: prometheus-bridge
        image: gillikesprogmetal/prometheus-bridge:latest
        env:
          - name: PROM_API
            value: http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/query
          - name: SPEEDTEST_TRACKER_URL
            value: http://speedtest-tracker.utils.svc.cluster.local:8765
        ports:
          - containerPort: 5000

